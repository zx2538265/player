<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT + SRT 自訂字幕</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #111;
      color: #fff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    body.no-scroll {
      overflow: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      --subtitle-scale: 1;
      --subtitle-bottom: 8%;
      --subtitle-bottom-fs: 6%;
      --subtitle-bottom-fs-mobile: 10%;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }

    .toolbar input[type="text"] {
      height: 42px;
      border: 1px solid #444;
      border-radius: 10px;
      background: #1c1c1c;
      color: #fff;
      padding: 0 12px;
      font-size: 16px;
    }

    .toolbar button,
    .toolbar input[type="file"] {
      height: 42px;
      font-size: 14px;
    }

    .toolbar button {
      border: 1px solid #3a3a3a;
      background: #252525;
      color: #fff;
      border-radius: 10px;
      padding: 0 14px;
      cursor: pointer;
    }

    .toolbar button:hover {
      background: #2f2f2f;
    }

    #videoIdInput,
    #loadVideoBtn,
    #srtFileInput,
    #toggleFullscreenBtn,
    #subtitleList {
      display: none !important;
    }

    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
      border-radius: 16px;
    }

    .player-wrap.is-pseudo-fullscreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      aspect-ratio: auto;
      border-radius: 0;
      z-index: 9999;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .subtitle-layer {
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: var(--subtitle-bottom);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    .subtitle-text {
      display: inline-block;
      max-width: 90%;
      padding: 3px 14px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.45);
      font-size: calc(clamp(24px, 1.9vw, 32px) * var(--subtitle-scale));
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      text-shadow:
        0 0 2px #000,
        0 0 4px #000,
        0 0 8px #000,
        0 0 12px #000;
    }

    .player-wrap.is-fullscreen .subtitle-layer {
      bottom: var(--subtitle-bottom-fs);
    }

    .player-wrap.is-pseudo-fullscreen .subtitle-layer {
      bottom: var(--subtitle-bottom-fs);
    }

    .player-wrap.is-fullscreen .subtitle-text {
      font-size: calc(clamp(24px, 1.9vh + 0.6vw, 46px) * var(--subtitle-scale));
    }

    .player-wrap.is-pseudo-fullscreen .subtitle-text {
      font-size: calc(clamp(24px, 1.9vh + 0.6vw, 46px) * var(--subtitle-scale));
    }

    @media (max-width: 1024px) {
      .subtitle-text {
        font-size: calc(clamp(20px, 2.8vw, 28px) * var(--subtitle-scale));
      }
    }

    @media (max-width: 768px) {
      .subtitle-layer {
        left: 5%;
        right: 5%;
      }

      .subtitle-text {
        font-size: calc(clamp(14px, 3.8vw, 21px) * var(--subtitle-scale));
        line-height: 1.5;
      }

      .player-wrap.is-fullscreen .subtitle-layer {
        bottom: var(--subtitle-bottom-fs-mobile);
      }

      .player-wrap.is-pseudo-fullscreen .subtitle-layer {
        bottom: var(--subtitle-bottom-fs-mobile);
      }

      .player-wrap.is-fullscreen .subtitle-text {
        font-size: calc(clamp(16px, 2.2vh + 0.9vw, 26px) * var(--subtitle-scale));
      }

      .player-wrap.is-pseudo-fullscreen .subtitle-text {
        font-size: calc(clamp(16px, 2.2vh + 0.9vw, 26px) * var(--subtitle-scale));
      }
    }

    .subtitle-settings {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px 14px;
      align-items: end;
      background: #181818;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 12px;
    }

    .setting-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .setting-label {
      color: #d8d8d8;
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    .setting-field input[type="range"] {
      width: 100%;
      accent-color: #9ecbff;
    }

    .setting-value {
      color: #9ecbff;
      font-size: 12px;
      min-height: 16px;
    }

    .setting-reset {
      height: 34px;
      border-radius: 8px;
      border: 1px solid #3b3b3b;
      background: #242424;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .setting-reset:hover {
      background: #2c2c2c;
    }

    @media (max-width: 900px) {
      .subtitle-settings {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }
    }

    @media (max-width: 580px) {
      .subtitle-settings {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .container {
        max-width: 100%;
      }

      .player-wrap {
        border-radius: 12px;
      }

      .toolbar {
        margin-bottom: 12px;
      }

      #toggleFullscreenBtn {
        width: 100%;
      }

      .subtitle-settings {
        margin-top: 10px;
        padding: 10px;
      }

      .list {
        margin-top: 12px;
      }
    }

    .info {
      margin-top: 16px;
      color: #bbb;
      font-size: 14px;
    }

    .list {
      margin-top: 20px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item.active {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
    }

    .time {
      color: #9ecbff;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .text {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <input id="videoIdInput" type="text" placeholder="請輸入 YouTube 影片 ID，例如 dqNMWaT9mog" />
      <button id="loadVideoBtn">載入影片</button>
      <button id="toggleFullscreenBtn" type="button">全螢幕</button>
      <input id="srtFileInput" type="file" accept=".srt" />
    </div>

    <div class="player-wrap">
      <div id="player"></div>
      <div class="subtitle-layer">
        <div id="subtitle" class="subtitle-text"></div>
      </div>
    </div>

    <div class="subtitle-settings" id="subtitleSettings">
      <div class="setting-field">
        <label class="setting-label" for="subtitleScaleRange">字幕大小</label>
        <input
          id="subtitleScaleRange"
          type="range"
          min="80"
          max="160"
          step="1"
          value="100"
        />
        <div class="setting-value" id="subtitleScaleValue">100%</div>
      </div>

      <div class="setting-field">
        <label class="setting-label" for="subtitleBottomRange">一般位置（底部）</label>
        <input
          id="subtitleBottomRange"
          type="range"
          min="2"
          max="20"
          step="1"
          value="8"
        />
        <div class="setting-value" id="subtitleBottomValue">8%</div>
      </div>

      <div class="setting-field">
        <button id="resetSubtitleSettingsBtn" type="button" class="setting-reset">
          重設字幕設定
        </button>
      </div>
    </div>

    <div class="info" id="info">尚未載入字幕</div>
    <div class="list" id="subtitleList"></div>
  </div>

  <script>
    let player = null;
    let syncTimer = null;
    let subtitles = [];
    let currentSubtitleIndex = -1;
    let subtitleRequestToken = 0;
    let subtitleOriginalParent = null;
    let subtitleOriginalNextSibling = null;
    let isPseudoFullscreen = false;

    const videoIdInput = document.getElementById("videoIdInput");
    const infoEl = document.getElementById("info");
    const containerEl = document.querySelector(".container");
    const playerWrapEl = document.querySelector(".player-wrap");
    const subtitleLayerEl = document.querySelector(".subtitle-layer");
    const subtitleScaleRangeEl = document.getElementById("subtitleScaleRange");
    const subtitleBottomRangeEl = document.getElementById("subtitleBottomRange");
    const subtitleBottomFsRangeEl = document.getElementById("subtitleBottomFsRange");
    const subtitleScaleValueEl = document.getElementById("subtitleScaleValue");
    const subtitleBottomValueEl = document.getElementById("subtitleBottomValue");
    const subtitleBottomFsValueEl = document.getElementById("subtitleBottomFsValue");
    const resetSubtitleSettingsBtnEl = document.getElementById("resetSubtitleSettingsBtn");
    const toggleFullscreenBtnEl = document.getElementById("toggleFullscreenBtn");
    const initialVideoId = new URLSearchParams(window.location.search).get("v")?.trim() || "";
    const subtitleSettingsStorageKey = "yt-srt-subtitle-settings";

    const defaultSubtitleSettings = {
      scale: 100,
      bottom: 8,
      bottomFs: 6
    };

    let subtitleSettings = { ...defaultSubtitleSettings };

    subtitleOriginalParent = subtitleLayerEl.parentElement;
    subtitleOriginalNextSibling = subtitleLayerEl.nextSibling;

    if (initialVideoId) {
      videoIdInput.value = initialVideoId;
      infoEl.textContent = `已從網址讀取影片 ID：${initialVideoId}`;
    }

    function normalizeSubtitleSettings(raw) {
      const scale = Number(raw?.scale);
      const bottom = Number(raw?.bottom);
      const bottomFs = Number(raw?.bottomFs);

      return {
        scale: Number.isFinite(scale) ? Math.min(160, Math.max(80, Math.round(scale))) : defaultSubtitleSettings.scale,
        bottom: Number.isFinite(bottom) ? Math.min(20, Math.max(2, Math.round(bottom))) : defaultSubtitleSettings.bottom,
        bottomFs: Number.isFinite(bottomFs) ? Math.min(20, Math.max(2, Math.round(bottomFs))) : defaultSubtitleSettings.bottomFs
      };
    }

    function getMobileFullscreenBottom(bottomFs) {
      return Math.max(10, bottomFs);
    }

    function applySubtitleSettings() {
      containerEl.style.setProperty("--subtitle-scale", (subtitleSettings.scale / 100).toString());
      containerEl.style.setProperty("--subtitle-bottom", `${subtitleSettings.bottom}%`);
      containerEl.style.setProperty("--subtitle-bottom-fs", `${subtitleSettings.bottomFs}%`);
      containerEl.style.setProperty("--subtitle-bottom-fs-mobile", `${getMobileFullscreenBottom(subtitleSettings.bottomFs)}%`);

      subtitleScaleRangeEl.value = String(subtitleSettings.scale);
      subtitleBottomRangeEl.value = String(subtitleSettings.bottom);
      if (subtitleBottomFsRangeEl) {
        subtitleBottomFsRangeEl.value = String(subtitleSettings.bottomFs);
      }

      subtitleScaleValueEl.textContent = `${subtitleSettings.scale}%`;
      subtitleBottomValueEl.textContent = `${subtitleSettings.bottom}%`;
      if (subtitleBottomFsValueEl) {
        subtitleBottomFsValueEl.textContent = `${subtitleSettings.bottomFs}%`;
      }
    }

    function saveSubtitleSettings() {
      localStorage.setItem(subtitleSettingsStorageKey, JSON.stringify(subtitleSettings));
    }

    function loadSubtitleSettings() {
      try {
        const raw = localStorage.getItem(subtitleSettingsStorageKey);
        if (!raw) return;
        subtitleSettings = normalizeSubtitleSettings(JSON.parse(raw));
      } catch (err) {
        subtitleSettings = { ...defaultSubtitleSettings };
      }
    }

    function bindSubtitleSettingEvents() {
      subtitleScaleRangeEl.addEventListener("input", () => {
        subtitleSettings.scale = Number(subtitleScaleRangeEl.value);
        applySubtitleSettings();
        saveSubtitleSettings();
      });

      subtitleBottomRangeEl.addEventListener("input", () => {
        subtitleSettings.bottom = Number(subtitleBottomRangeEl.value);
        applySubtitleSettings();
        saveSubtitleSettings();
      });

      if (subtitleBottomFsRangeEl) {
        subtitleBottomFsRangeEl.addEventListener("input", () => {
          subtitleSettings.bottomFs = Number(subtitleBottomFsRangeEl.value);
          applySubtitleSettings();
          saveSubtitleSettings();
        });
      }

      resetSubtitleSettingsBtnEl.addEventListener("click", () => {
        subtitleSettings = { ...defaultSubtitleSettings };
        applySubtitleSettings();
        saveSubtitleSettings();
      });
    }

    loadSubtitleSettings();
    applySubtitleSettings();
    bindSubtitleSettingEvents();

    function srtTimeToSeconds(timeStr) {
      // 00:01:02,500 -> 秒
      const match = timeStr.trim().match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
      if (!match) return 0;
      const [, hh, mm, ss, ms] = match;
      return (
        parseInt(hh, 10) * 3600 +
        parseInt(mm, 10) * 60 +
        parseInt(ss, 10) +
        parseInt(ms, 10) / 1000
      );
    }

    function parseSrt(srtText) {
      // 處理 BOM
      srtText = srtText.replace(/^\uFEFF/, "");

      // 統一換行
      const normalized = srtText.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

      // 每段字幕以空白行分隔
      const blocks = normalized.split(/\n{2,}/);
      const results = [];

      for (const block of blocks) {
        const lines = block.split("\n").filter(Boolean);
        if (lines.length < 2) continue;

        let index = 0;

        // 第一行可能是序號
        if (/^\d+$/.test(lines[0].trim())) {
          index = 1;
        }

        const timeLine = lines[index];
        if (!timeLine || !timeLine.includes("-->")) continue;

        const [startStr, endStr] = timeLine.split("-->").map(s => s.trim());
        const text = lines.slice(index + 1).join("\n").trim();

        if (!text) continue;

        results.push({
          start: srtTimeToSeconds(startStr),
          end: srtTimeToSeconds(endStr),
          text
        });
      }

      return results;
    }

    function formatTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      const ms = Math.round((sec - Math.floor(sec)) * 1000);

      const hh = String(h).padStart(2, "0");
      const mm = String(m).padStart(2, "0");
      const ss = String(s).padStart(2, "0");
      const mmm = String(ms).padStart(3, "0");

      return `${hh}:${mm}:${ss},${mmm}`;
    }

    function renderSubtitleList() {
      const list = document.getElementById("subtitleList");
      list.innerHTML = "";

      subtitles.forEach((sub, i) => {
        const div = document.createElement("div");
        div.className = "item" + (i === currentSubtitleIndex ? " active" : "");
        div.innerHTML = `
          <div class="time">${formatTime(sub.start)} --> ${formatTime(sub.end)}</div>
          <div class="text"></div>
        `;
        div.querySelector(".text").textContent = sub.text;

        div.addEventListener("click", () => {
          if (player && typeof player.seekTo === "function") {
            player.seekTo(sub.start, true);
          }
        });

        list.appendChild(div);
      });
    }

    function updateActiveSubtitle(index) {
      currentSubtitleIndex = index;
      const subtitleEl = document.getElementById("subtitle");

      if (index >= 0) {
        subtitleEl.textContent = subtitles[index].text;
      } else {
        subtitleEl.textContent = "";
      }

      renderSubtitleList();
    }

    function syncSubtitle() {
      if (!player || typeof player.getCurrentTime !== "function") return;

      const currentTime = player.getCurrentTime();
      const index = subtitles.findIndex(
        s => currentTime >= s.start && currentTime <= s.end
      );

      if (index !== currentSubtitleIndex) {
        updateActiveSubtitle(index);
      }
    }

    function getFullscreenElement() {
      return (
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.msFullscreenElement ||
        null
      );
    }

    function requestElementFullscreen(el) {
      if (!el) return;

      if (el.requestFullscreen) {
        return el.requestFullscreen();
      } else if (el.webkitRequestFullscreen) {
        return el.webkitRequestFullscreen();
      } else if (el.msRequestFullscreen) {
        return el.msRequestFullscreen();
      }

      return Promise.reject(new Error("Fullscreen API unavailable"));
    }

    function exitFullscreen() {
      if (document.exitFullscreen) {
        return document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        return document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        return document.msExitFullscreen();
      }

      return Promise.resolve();
    }

    function enterPseudoFullscreen() {
      isPseudoFullscreen = true;
      playerWrapEl.classList.add("is-pseudo-fullscreen");
      playerWrapEl.classList.add("is-fullscreen");
      document.body.classList.add("no-scroll");
      toggleFullscreenBtnEl.textContent = "離開全螢幕";
    }

    function exitPseudoFullscreen() {
      isPseudoFullscreen = false;
      playerWrapEl.classList.remove("is-pseudo-fullscreen");
      playerWrapEl.classList.remove("is-fullscreen");
      document.body.classList.remove("no-scroll");
      toggleFullscreenBtnEl.textContent = "全螢幕";
    }

    // 全螢幕修正：進入全螢幕時把字幕層搬到全螢幕節點內，離開時再移回原本 .player-wrap。
    function syncSubtitleLayerForFullscreen() {
      const fullscreenEl = getFullscreenElement();
      const isPlayerFullscreen = !!fullscreenEl && playerWrapEl.contains(fullscreenEl);

      if (isPseudoFullscreen) {
        playerWrapEl.classList.add("is-fullscreen");
        toggleFullscreenBtnEl.textContent = "離開全螢幕";
        return;
      }

      if (isPlayerFullscreen) {
        if (subtitleLayerEl.parentElement !== fullscreenEl) {
          fullscreenEl.appendChild(subtitleLayerEl);
        }
        playerWrapEl.classList.add("is-fullscreen");
        toggleFullscreenBtnEl.textContent = "離開全螢幕";
      } else {
        if (subtitleLayerEl.parentElement !== subtitleOriginalParent) {
          if (subtitleOriginalNextSibling && subtitleOriginalNextSibling.parentNode === subtitleOriginalParent) {
            subtitleOriginalParent.insertBefore(subtitleLayerEl, subtitleOriginalNextSibling);
          } else {
            subtitleOriginalParent.appendChild(subtitleLayerEl);
          }
        }
        playerWrapEl.classList.remove("is-fullscreen");
        toggleFullscreenBtnEl.textContent = "全螢幕";
      }
    }

    // 因 YouTube iframe 內建全螢幕在跨網域文件內，外層頁面的字幕層無法覆蓋。
    // 這裡改用外層容器全螢幕，確保自訂字幕可持續顯示。
    function togglePlayerFullscreen() {
      const fullscreenEl = getFullscreenElement();
      const isPlayerFullscreen = !!fullscreenEl && playerWrapEl.contains(fullscreenEl);

      if (isPseudoFullscreen) {
        exitPseudoFullscreen();
        return;
      }

      if (isPlayerFullscreen) {
        exitFullscreen();
      } else {
        Promise.resolve(requestElementFullscreen(playerWrapEl)).catch(() => {
          enterPseudoFullscreen();
        });
      }
    }

    function handleKeydown(e) {
      if (e.key === "Escape" && isPseudoFullscreen) {
        exitPseudoFullscreen();
      }
    }

    async function loadSubtitleFromSrtFolder(videoId) {
      const requestToken = ++subtitleRequestToken;
      const srtPath = `srt/${encodeURIComponent(videoId)}.srt`;

      infoEl.textContent = `嘗試載入字幕：${srtPath}`;

      try {
        const response = await fetch(srtPath, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const text = await response.text();
        if (requestToken !== subtitleRequestToken) return;

        subtitles = parseSrt(text);
        infoEl.textContent =
          subtitles.length > 0
            ? `已自動載入字幕（${srtPath}），共 ${subtitles.length} 段`
            : `已讀取 ${srtPath}，但解析不到字幕內容`;

        updateActiveSubtitle(-1);
        renderSubtitleList();
      } catch (err) {
        if (requestToken !== subtitleRequestToken) return;

        subtitles = [];
        updateActiveSubtitle(-1);
        renderSubtitleList();
        infoEl.textContent = `找不到對應字幕檔：${srtPath}`;
      }
    }

    function loadVideoById(videoId) {
      if (!videoId) {
        alert("請輸入 YouTube 影片 ID");
        return;
      }

      if (player && typeof player.loadVideoById === "function") {
        player.loadVideoById(videoId);
      }

      loadSubtitleFromSrtFolder(videoId);
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: "",
        playerVars: {
          autoplay: 0,
          controls: 1,
          fs: 0,
          rel: 0,
          playsinline: 1,
          enablejsapi: 1
        },
        events: {
          onReady: () => {
            if (syncTimer) clearInterval(syncTimer);
            syncTimer = setInterval(syncSubtitle, 150);

            if (initialVideoId) {
              loadVideoById(initialVideoId);
            }
          }
        }
      });
    }

    document.getElementById("loadVideoBtn").addEventListener("click", () => {
      const videoId = videoIdInput.value.trim();
      loadVideoById(videoId);
    });

    toggleFullscreenBtnEl.addEventListener("click", togglePlayerFullscreen);

    document.getElementById("srtFileInput").addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        const text = reader.result;
        subtitles = parseSrt(text);

        infoEl.textContent =
          subtitles.length > 0
            ? `已載入字幕，共 ${subtitles.length} 段`
            : "字幕解析失敗或沒有讀到資料";

        updateActiveSubtitle(-1);
        renderSubtitleList();
      };

      reader.onerror = () => {
        alert("讀取字幕檔失敗");
      };

      reader.readAsText(file, "utf-8");
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    document.addEventListener("fullscreenchange", syncSubtitleLayerForFullscreen);
    document.addEventListener("webkitfullscreenchange", syncSubtitleLayerForFullscreen);
    document.addEventListener("msfullscreenchange", syncSubtitleLayerForFullscreen);
    document.addEventListener("keydown", handleKeydown);

    window.addEventListener("beforeunload", () => {
      if (syncTimer) clearInterval(syncTimer);
      document.removeEventListener("fullscreenchange", syncSubtitleLayerForFullscreen);
      document.removeEventListener("webkitfullscreenchange", syncSubtitleLayerForFullscreen);
      document.removeEventListener("msfullscreenchange", syncSubtitleLayerForFullscreen);
      document.removeEventListener("keydown", handleKeydown);
    });
  </script>
</body>
</html>
